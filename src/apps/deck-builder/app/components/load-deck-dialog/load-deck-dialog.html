<dialog #loadDeckDialog>
	<div class="load-deck">
		<h2 class="load-deck-title">Load deck</h2>
		<div>
			<label for="load-deck">Deck</label>
			<select class="load-deck-select" id="load-deck" (change)="handelSelectionChange($event)">
				<button>
					<selectedcontent></selectedcontent>
					<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
						fill="#1f1f1f">
						<path d="M480-360 280-560h400L480-360Z" />
					</svg>
				</button>
				@for (collectionDeck of sortedCollectionDecks(); track
				collectionDeck._id) {
				<option [value]="collectionDeck._id">{{collectionDeck.name}}</option>
				}
			</select>
		</div>
		<div class="load-deck-actions">
			<button class="md-text-button" (click)="closeLoadDeckDialog()">
				Cancel
			</button>
			<button class="md-text-button" (click)="loadDeckAndCloseDialog()" [disabled]="loadDeckForm()().invalid()">
				Load
			</button>
		</div>
	</div>
</dialog>
