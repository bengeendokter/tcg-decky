<dialog #shareDeckDialog>
	<div class="share-deck">
		<h2 class="share-deck-title">Share deck</h2>
		<div>
			<span>Are you sure you want to open this deck in Limitless?</span>
		</div>
		<div class="share-deck-actions">
			<button class="md-text-button" (click)="closeShareDeckDialog()">Cancel</button>
			<button class="md-text-button" (click)="shareDeckAndCloseDialog()">Open</button>
		</div>
	</div>
</dialog>
