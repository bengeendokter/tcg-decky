<dialog #deleteDeckDialog>
	<div class="delete-deck">
		<h2 class="delete-deck-title">Delete deck</h2>
		<div>
			<span>Are you sure you want to delete this deck?</span>
		</div>
		<div class="delete-deck-actions">
			<button class="md-text-button" (click)="closeDeleteDeckDialog()">Cancel</button>
			<button class="md-text-button" (click)="deleteDeckAndCloseDialog()">Delete</button>
		</div>
	</div>
</dialog>
